services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      USERNAME: "User5054"
      PASSWORD: "5054User"
      VERSION: "10"
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "128G"
      KVM: "N"
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"
      - "3389:3389/tcp"
    volumes:
      - ./windows:/storage
    restart: unless-stopped
    stop_grace_period: 2m
